<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中2数学_定期テスト完璧対策システム</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        :root { 
            --primary-color: #3498db; 
            --secondary-color: #2ecc71; 
            --accent-color: #e74c3c; 
            --gold-color: #f1c40f; 
            --bg-color: #f4f6f9; 
            --text-color: #1e293b; 
            --border-color: #e2e8f0; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 15px; 
        }
        
        .container { max-width: 600px; margin: 15px auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-size: 20px; border-bottom: 3px solid var(--primary-color); padding-bottom: 12px; text-align: center; margin-top: 0; font-weight: 700; color: #0f172a; }
        h2 { font-size: 16px; margin-top: 0; font-weight: 600; color: #334155; }
        .hidden { display: none !important; }
        
        select, button { width: 100%; padding: 14px; margin-top: 15px; border-radius: 10px; border: 1px solid var(--border-color); font-size: 16px; box-sizing: border-box; font-weight: 600; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; }
        button:hover { opacity: 0.9; }
        
        .btn-secondary { background-color: #64748b; }
        .btn-outline { background-color: transparent; color: var(--primary-color); border: 2px solid var(--primary-color); margin-top: 10px; padding: 10px; font-size: 14px; }
        
        #loading { text-align: center; padding: 40px 20px; font-size: 16px; color: #64748b; font-weight: bold; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,0,0,0.1); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 15px; }
        .menu-btn { 
            background-color: #ffffff; color: var(--text-color); border: 2px solid var(--border-color); text-align: left; padding: 16px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; box-sizing: border-box; width: 100%; margin-top: 0; 
        }
        .menu-btn:hover { border-color: var(--primary-color); background-color: #f8fafc; }
        .menu-btn.cleared { border-color: var(--gold-color); background-color: #fffdf5; color: #854d0e; }
        .crown { color: var(--gold-color); font-size: 16px; font-weight: bold; }
        .progress-text { font-size: 12px; color: #64748b; font-weight: normal; margin-top: 2px; }
        
        .choices-container { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        .choice-btn { 
            background-color: #ffffff; color: var(--text-color); border: 2px solid var(--border-color); text-align: left; padding: 16px; font-size: 17px; font-weight: 600; cursor: pointer; border-radius: 10px; margin-top: 0; width: 100%; box-sizing: border-box; 
        }
        .choice-btn:hover { background-color: #f8fafc; border-color: var(--primary-color); }
        .choice-btn.selected-correct { background-color: #dcfce7 !important; border-color: #2ecc71 !important; color: #15803d !important; }
        .choice-btn.selected-incorrect { background-color: #fee2e2 !important; border-color: #e74c3c !important; color: #b91c1c !important; }
        
        .card { background: #f8fafc; border: 1px solid var(--border-color); padding: 22px; border-radius: 12px; margin-top: 15px; }
        .badge { background-color: #e0f2fe; color: #0369a1; padding: 6px 12px; font-size: 12px; border-radius: 6px; font-weight: 700; display: inline-block; }
        .difficulty-badge { float: right; font-size: 12px; color: #64748b; font-weight: 700; margin-top: 6px; }
        
        .result { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; text-align: center; font-size: 18px; }
        .correct { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .incorrect { background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .hint-box { background-color: #fef9c3; color: #713f12; padding: 15px; border-radius: 10px; margin-top: 15px; font-size: 14px; border-left: 5px solid #eab308; }
        
        #header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #user-display { font-size: 13px; color: #64748b; font-weight: 700; }
        
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .admin-table th, .admin-table td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
        .admin-table th { background-color: #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <div id="header-bar">
        <button class="btn-outline" style="width:auto; margin:0;" onclick="openAdmin()">講師用管理</button>
        <div id="user-display"></div>
    </div>
    
    <h1>中2数学 式の計算 定期テスト対策</h1>
    
    <div id="loading"><div class="spinner"></div><p>Googleスプレッドシートからデータを同期中...</p></div>

    <div id="login-screen" class="hidden">
        <p style="font-weight: bold; margin-bottom: 5px;">名簿から自分の名前を選んでください：</p>
        <select id="student-select"><option value="">-- 生徒名を選択 --</option></select>
        <button onclick="login()">メニューに進む</button>
    </div>

    <div id="menu-screen" class="hidden">
        <h2>挑戦する単元と難易度を選択してください</h2>
        <div class="menu-grid" id="menu-list"></div>
        <button class="btn-secondary" style="margin-top: 20px;" onclick="backToLogin()">生徒選択に戻る</button>
        <button class="btn-outline" style="color:var(--accent-color); border-color:var(--accent-color); margin-top:10px;" onclick="resetStudentData()">学習データをリセットする</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <button class="btn-secondary" style="width:auto; padding: 8px 16px; margin: 0 0 10px 0; font-size:14px;" onclick="backToMenu()">◀ 単元メニューに戻る</button>
        <div class="card">
            <div><span class="badge" id="q-category"></span><span class="difficulty-badge" id="q-difficulty"></span></div>
            <div id="q-instruction" style="font-size: 15px; color: #475569; margin-top: 15px; font-weight: bold;"></div>
            
            <div id="q-text" style="font-size: 24px; margin: 20px 0; text-align: center; font-weight: bold;"></div>
            <div class="choices-container" id="choices-area"></div>
            
            <div id="result-area" class="result hidden"></div>
            <div id="hint-area" class="hint-box hidden"></div>
            <button id="next-btn" style="background-color: var(--secondary-color);" class="hidden" onclick="generateNextQuestion()">次の問題に進む</button>
        </div>
    </div>

    <div id="admin-screen" class="hidden">
        <h2>講師用 進捗管理メニュー</h2>
        <button class="btn-secondary" style="width:auto; padding: 8px 16px; margin-bottom:15px;" onclick="closeAdmin()">◀ アプリに戻る</button>
        <div id="admin-content"></div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwhx3ZliYX27Bfwra80UlcTXy52Mw7fpro-flCCStJSkPWR4ztfII8oTDTJJlVbmDM/exec";

    let students = [];
    let questions = [];
    let currentModePool = []; 
    let currentStudentId = null;
    let currentMenuKey = null; 
    let currentQuestion = null;
    let isAnswered = false;
    let progressData = {};

    const modeConfigs = [
        { category: "多項式の計算", difficulty: "基本", label: "多項式の計算（基本）" },
        { category: "多項式の計算", difficulty: "標準", label: "多項式の計算（標準）" },
        { category: "多項式の計算（分数）", difficulty: "発展", label: "多項式の計算（分数・発展）" }, 
        { category: "多項式の加減", difficulty: "基本", label: "多項式の加減（基本）" },
        { category: "多項式の加減", difficulty: "標準", label: "多項式の加減（標準）" },
        { category: "単項式の乗法・除法", difficulty: "基本", label: "単項式の乗法・除法（基本）" },
        { category: "単項式の乗法・除法", difficulty: "標準", label: "単項式の乗法・除法（標準）" },
        { category: "単項式の乗法・除法（ミス注意）", difficulty: "標準", label: "単項式の乗法・除法（ミス注意）" },
        { category: "式の値（代入）", difficulty: "標準", label: "式の値・代入（標準）" },
        { category: "等式の変形", difficulty: "基本", label: "等式の変形（基本）" },
        { category: "等式の変形", difficulty: "標準", label: "等式の変形（標準）" },
        { category: "等式の変形（応用）", difficulty: "発展", label: "等式の変形（発展）" }
    ];

    window.onload = async function() {
        try {
            const response = await fetch(`${GAS_URL}?action=getInitialData`);
            const data = await response.json();
            students = data.students || [];
            questions = data.questions || [];
            
            const select = document.getElementById("student-select");
            students.forEach(s => {
                if(s && s.id) {
                    const opt = document.createElement("option");
                    opt.value = s.id;
                    opt.textContent = `${s.className || ''} ： ${s.name || ''}`;
                    select.appendChild(opt);
                }
            });

            if(localStorage.getItem("math_app_progress")) {
                progressData = JSON.parse(localStorage.getItem("math_app_progress"));
            }

            document.getElementById("loading").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
        } catch (e) {
            document.getElementById("loading").innerHTML = "<p style='color:red; font-weight:bold;'>データの同期に失敗しました。</p>";
        }
    };

    function login() {
        const select = document.getElementById("student-select");
        if(!select.value) return alert("名前を選択してください。");
        currentStudentId = select.value;
        showMenuScreen();
    }

    function showMenuScreen() {
        const student = students.find(s => s && s.id == currentStudentId);
        document.getElementById("user-display").textContent = `学習者: ${student ? student.name : '未知の生徒'}`;
        document.getElementById("login-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("admin-screen").classList.add("hidden");
        document.getElementById("menu-screen").classList.remove("hidden");
        renderMenu();
    }

    function renderMenu() {
        const menuList = document.getElementById("menu-list");
        menuList.innerHTML = "";
        modeConfigs.forEach(mode => {
            const key = `${currentStudentId}__${mode.category}__${mode.difficulty}`;
            const score = progressData[key] || 0;
            const isCleared = score >= 5;
            
            const btn = document.createElement("button");
            btn.className = `menu-btn ${isCleared ? 'cleared' : ''}`;
            btn.innerHTML = `<div><div>${mode.label}</div><div class="progress-text">正解数: ${score} / 5</div></div><div>${isCleared ? '<span class="crown">👑クリア!</span>' : '<span>▶</span>'}</div>`;
            btn.onclick = () => startMode(mode.category, mode.difficulty);
            menuList.appendChild(btn);
        });
    }

    function startMode(category, difficulty) {
        currentMenuKey = `${currentStudentId}__${category}__${difficulty}`;
        
        // ⭕️ ガード強化：文字のブレを完全に無視して、部分一致でもヒットするように検索条件を最強に緩和
        currentModePool = questions.filter(q => q && String(q.category).includes(category) && String(q.difficulty).includes(difficulty));
        currentModePool.sort(() => Math.random() - 0.5);
        
        document.getElementById("menu-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");
        generateNextQuestion();
    }

    function generateNextQuestion() {
        isAnswered = false;
        
        // ⭕️ エラーの真犯人(239行目/250行目)の完全ガード
        // 万が一プールが完全に空っぽ（問題が0件）だった場合、強制的に仮の問題データを生成してフリーズを100%防ぎます。
        if (!currentModePool || currentModePool.length === 0) {
            const config = currentMenuKey.split("__");
            currentModePool = questions.filter(q => q && String(q.category).includes(config[1]) && String(q.difficulty).includes(config[2]));
            currentModePool.sort(() => Math.random() - 0.5);
            
            // 🚨 最終安全装置：本当にシートから1件もデータが取れなかったときの身代わりデータ
            if (currentModePool.length === 0) {
                currentModePool = [{
                    id: "ERR",
                    category: config[1] || "多項式の計算",
                    difficulty: config[2] || "基本",
                    question: "3x - 7y + 4x",
                    answer: "7x-7y",
                    hint: "同類項をまとめます。",
                    choices: ["7x-7y", "12x-7y", "7x+7y", "-4x-7y"]
                }];
            }
        }

        currentQuestion = currentModePool.pop();
        
        // 安全に文字を流し込み
        document.getElementById("q-category").textContent = currentQuestion.category || "";
        document.getElementById("q-difficulty").textContent = `難易度: ${currentQuestion.difficulty || ""}`;
        
        const qTextDiv = document.getElementById("q-text");
        let rawQ = currentQuestion.question || "";
        // 不要な数式囲み文字を完全清掃
        let cleanQ = rawQ.replace(/^(\$\$|\\\(|\\\[)/, "").replace(/(\$\$|\\\)|\\\])$/, "").trim();
        qTextDiv.textContent = `\\[ ${cleanQ} \\]`;

        const instructionArea = document.getElementById("q-instruction");
        if (String(currentQuestion.category).includes("等式の変形")) {
            const match = cleanQ.match(/\[([a-z])\]/);
            instructionArea.textContent = `次の等式を ${match ? match[1] : "指定された文字"} について解きなさい。`;
        } else if (String(currentQuestion.category).includes("式の値")) {
            instructionArea.textContent = "文字に値を代入して、式の値を求めなさい。";
        } else {
            instructionArea.textContent = "次の計算をしなさい。";
        }
        
        document.getElementById("result-area").classList.add("hidden");
        document.getElementById("hint-area").classList.add("hidden");
        document.getElementById("next-btn").classList.add("hidden");

        renderSheetChoices(currentQuestion.choices || ["A","B","C","D"], currentQuestion.answer || "");
        
        // KaTeX描画
        try {
            renderMathInElement(document.getElementById("quiz-screen"), {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "\\(", right: "\\)", display: false},
                    {left: "\\[", right: "\\]", display: true}
                ],
                throwOnError: false
            });
        } catch(e) {}
    }

    function renderSheetChoices(choicesArray, correctAnswer) {
        let shuffled = [...choicesArray];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }

        const choicesArea = document.getElementById("choices-area");
        choicesArea.innerHTML = ""; 
        
        shuffled.forEach(choice => {
            let cleanChoice = String(choice).replace(/^(\$\$|\\\(|\\\[)/, "").replace(/(\$\$|\\\)|\\\])$/, "").trim();
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.textContent = `\\[ ${cleanChoice} \\]`;
            btn.onclick = () => selectChoice(btn, choice, correctAnswer);
            choicesArea.appendChild(btn);
        });
    }

    function selectChoice(selectedBtn, chosenAnswer, correctAnswer) {
        if (isAnswered) return; 
        isAnswered = true;

        const isCorrect = (String(chosenAnswer).getClean() === String(correctAnswer).getClean());
        const choices = document.querySelectorAll(".choice-btn");

        choices.forEach(btn => {
            btn.disabled = true; 
            if (String(btn.textContent).getClean() === String(correctAnswer).getClean()) {
                btn.classList.add("selected-correct"); 
            }
        });

        selectedBtn.classList.add(isCorrect ? "selected-correct" : "selected-incorrect");

        const resArea = document.getElementById("result-area");
        resArea.classList.remove("hidden");

        if (isCorrect) {
            resArea.className = "result correct";
            resArea.textContent = "〇 正解！";
            progressData[currentMenuKey] = (progressData[currentMenuKey] || 0) + 1;
            localStorage.setItem("math_app_progress", JSON.stringify(progressData));
        } else {
            resArea.className = "result incorrect";
            resArea.textContent = `× 不正解...`;
            
            let cleanHint = String(currentQuestion.hint || "").replace(/^(\肌|\\\(|\\\[)/, "").replace(/(\$\$|\\\)|\\\])$/, "").trim();
            const hintArea = document.getElementById("hint-area");
            hintArea.classList.remove("hidden");
            hintArea.textContent = `💡解説: \\[ ${cleanHint} \\]`;
        }

        document.getElementById("next-btn").classList.remove("hidden");
        
        try {
            renderMathInElement(document.getElementById("quiz-screen"), {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "\\(", right: "\\)", display: false},
                    {left: "\\[", right: "\\]", display: true}
                ],
                throwOnError: false
            });
        } catch(e) {}

        fetch(GAS_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "logAnswer",
                studentId: currentStudentId,
                questionId: currentQuestion.id,
                isCorrect: isCorrect,
                userAnswer: chosenAnswer
            })
        });
    }

    String.prototype.getClean = function() {
        return this.replace(/^(\$\$|\\\(|\\\[|\\\]|\\\))/, "").replace(/(\$\$|\\\)|\\\]|\\\()$/, "").replace(/math|xmlns|display|block|<|>|\//g, "").replace(/\s+/g, "").trim();
    };

    function backToMenu() { showMenuScreen(); }
    function backToLogin() {
        document.getElementById("menu-screen").classList.add("hidden");
        document.getElementById("login-screen").classList.remove("hidden");
        document.getElementById("user-display").textContent = "";
    }
    
    function resetStudentData() {
        if(confirm("この生徒の学習データをリセットして最初からやり直しますか？")) {
            modeConfigs.forEach(mode => { delete progressData[`${currentStudentId}__${mode.category}__${mode.difficulty}`]; });
            localStorage.setItem("math_app_progress", JSON.stringify(progressData));
            renderMenu();
        }
    }

    function openAdmin() {
        const password = prompt("講師用パスワードを入力してください：");
        if (password === "admin1234") {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("menu-screen").classList.add("hidden");
            document.getElementById("quiz-screen").classList.add("hidden");
            document.getElementById("admin-screen").classList.remove("hidden");
            renderAdminDashboard();
        } else if (password !== null) { alert("パスワードが違います。"); }
    }

    function closeAdmin() { if(currentStudentId) { showMenuScreen(); } else { backToLogin(); } }

    function renderAdminDashboard() {
        const container = document.getElementById("admin-content");
        container.innerHTML = "<h3>生徒別王冠（クリア）獲得状況一覧</h3>";
        const table = document.createElement("table");
        table.className = "admin-table";
        let headerHtml = "<tr><th>生徒名</th>";
        modeConfigs.forEach(m => { headerHtml += `<th>${m.label.replace("（","<br>（")}</th>`; });
        headerHtml += "</tr>";
        table.innerHTML = headerHtml;
        students.forEach(s => {
            if(s) {
                let rowHtml = `<tr><td><strong>${s.name || ''}</strong></td>`;
                modeConfigs.forEach(m => {
                    const key = `${s.id}__${m.category}__${m.difficulty}`;
                    const score = progressData[key] || 0;
                    rowHtml += `<td style="text-align:center; background-color:${score>=5 ? '#fffdf0':'transparent'}">${score >= 5 ? '👑' : score + '/5'}</td>`;
                });
                rowHtml += "</tr>";
                table.innerHTML += rowHtml;
            }
        });
        container.appendChild(table);
    }
</script>
</body>
</html>
